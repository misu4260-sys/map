const APS = ["西藏", "四川", "湖北", "甘肃", "吉林", "江苏", "陕西", "湖南", "内蒙古", "广东", "福建", "云南", "浙江", "江西", "黑龙江", "辽宁", "河南", "山东", "安徽", "青海", "新疆", "广西", "海南", "山西", "宁夏", "贵州", "河北", "北京", "重庆", "上海", "其他"];
const F = {scene:'all'};
let SP=new Set(), Q='', chart=null, countyPts=[];

function extractCounties(geo) {
  const coveredKeys = new Set(D.map(d=>`${d.coords[0].toFixed(1)},${d.coords[1].toFixed(1)}`));
  const pts = [];
  geo.features.forEach(f => {
    if (f.properties?.level !== 'district') return;
    const name = (f.properties?.name||'').replace(/(自治县|自治旗|新区|特区)$/,'').replace(/(县|区|市|旗)$/,'') || f.properties?.name;
    const geom = f.geometry; if (!geom) return;
    let lngs=[], lats=[];
    const walk = c => { if(typeof c[0]==='number'){lngs.push(c[0]);lats.push(c[1]);}else c.forEach(walk); };
    walk(geom.coordinates);
    if (!lngs.length) return;
    const lng=lngs.reduce((a,b)=>a+b)/lngs.length, lat=lats.reduce((a,b)=>a+b)/lats.length;
    if (!coveredKeys.has(`${lng.toFixed(1)},${lat.toFixed(1)}`))
      pts.push({name, value:[lng,lat]});
  });
  return pts;
}

function filt() {
  return D.filter(d => {
    if (F.scene!=='all' && d.scene!==F.scene) return false;
    if (SP.size>0 && !SP.has(d.province)) return false;
    if (Q && !d.name.includes(Q) && !d.province.includes(Q)) return false;
    return true;
  });
}

function refresh() {
  if (!chart) return;
  const fd = filt();
  let center=[104,36], zoom=1.25;
  if (SP.size===1 && fd.length>0) {
    const lngs=fd.map(d=>d.coords[0]), lats=fd.map(d=>d.coords[1]);
    center=[(Math.min(...lngs)+Math.max(...lngs))/2,(Math.min(...lats)+Math.max(...lats))/2];
    zoom=6;
  }
  chart.setOption({
    geo:[{ center, zoom }],
    series:[
      { name:'未覆盖区县', data:countyPts },
      { name:'已覆盖', data:fd.map(d=>({name:d.name,value:[d.coords[0],d.coords[1]],province:d.province,scene:d.scene})) }
    ]
  }, false);
  document.getElementById('st').textContent=fd.length;
  document.getElementById('ctip').textContent=`共 ${fd.length} 个覆盖点位`;
  document.getElementById('list').innerHTML=fd.map(d=>
    `<div class="li" onclick="fly(${d.coords[0]},${d.coords[1]})">
      <div class="ld"></div>
      <div class="ln" title="${d.name}">${d.name}</div>
      <div class="lp">${d.province}</div>
    </div>`
  ).join('');
}

function fly(lng,lat) {
  if (!chart) return;
  const z=chart.getOption().geo[0].zoom||1;
  chart.setOption({geo:[{center:[lng,lat],zoom:Math.max(8,z)}]},false);
}
function sf(btn){
  F[btn.dataset.g]=btn.dataset.v;
  btn.closest('.fbtns').querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); refresh();
}
function tgP(btn,p){
  SP.has(p)?(SP.delete(p),btn.classList.remove('on')):(SP.add(p),btn.classList.add('on'));
  document.getElementById('ptip').textContent=SP.size?`已选${SP.size}个`:'';
  refresh();
}
function clrP(){
  SP.clear(); document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  document.getElementById('ptip').textContent=''; refresh();
}
function onQ(){ Q=document.getElementById('q').value.trim(); refresh(); }
function initPBtns(){
  const counts={};
  D.forEach(d=>counts[d.province]=(counts[d.province]||0)+1);
  document.getElementById('pbtns').innerHTML=APS.map(p=>
    `<button class="pb" onclick="tgP(this,'${p}')">${p}<span class="pc">${counts[p]||0}</span></button>`
  ).join('');
}

async function loadGeo() {
  // 多个备用数据源，优先使用国内稳定的
  const URLS = [
    'https://geojson.cn/api/china/100000_full.json',          // 国内专用，最稳定
    'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json', // 阿里云
    'https://unpkg.com/echarts@5.4.3/map/json/china.json',    // unpkg
    'https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json', // jsdelivr
  ];
  let geo = null;
  for (const url of URLS) {
    try {
      document.getElementById('ltxt').textContent = '加载地图数据...';
      const r = await fetch(url, {signal: AbortSignal.timeout(15000)});
      if (!r.ok) continue;
      const d = await r.json();
      if (d.features?.length > 10) { geo = d; break; }
    } catch(e) {}
  }
  if (!geo) {
    document.getElementById('loading').innerHTML = '<div class="et">⚠️ 地图加载失败<br>请检查网络后刷新</div>';
    return;
  }
  echarts.registerMap('china', geo);
  countyPts = extractCounties(geo);
  document.getElementById('loading').style.display = 'none';
  chart = echarts.init(document.getElementById('map'));
  initPBtns();
  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger:'item',
      backgroundColor:'#fff', borderColor:'#bfdbfe', padding:[10,14],
      textStyle:{color:'#1a2a4a', fontSize:13},
      formatter: p => {
        if (!p.data) return '';
        const d = p.data;
        if (p.seriesName==='未覆盖区县')
          return `<b style="color:#6b7280">${d.name}</b><br><span style="color:#9ca3af;font-size:11px">暂无覆盖</span>`;
        return `<div style="line-height:2">
          <b style="font-size:14px;color:#1d4ed8">${d.name}</b><br>
          <span style="color:#6b7280">省份：</span>${d.province}<br>
          <span style="color:#6b7280">场景：</span>${d.scene}<br>
          <span style="color:#2563eb;font-weight:600">✓ 已覆盖</span>
        </div>`;
      }
    },
    geo:[{
      map:'china', roam:true, zoom:1.25, center:[104,36],
      itemStyle:{areaColor:'#e8f0fe', borderColor:'#93c5fd', borderWidth:0.8},
      emphasis:{itemStyle:{areaColor:'#dbeafe'}, label:{show:true, color:'#3b82f6', fontSize:10}},
      label:{show:false}
    }],
    series:[
      {
        name:'未覆盖区县', type:'scatter', coordinateSystem:'geo', data:[],
        symbolSize:5, large:true, largeThreshold:500,
        itemStyle:{color:'#cbd5e1', opacity:0.7},
        emphasis:{itemStyle:{color:'#94a3b8',opacity:1}, label:{show:true,formatter:'{b}',fontSize:11,color:'#64748b',position:'right',distance:4}},
        zlevel:1
      },
      {
        name:'已覆盖', type:'scatter', coordinateSystem:'geo', data:[],
        symbolSize:11,
        itemStyle:{color:'#2563eb', shadowBlur:10, shadowColor:'#3b82f666'},
        emphasis:{scale:1.7, itemStyle:{color:'#1d4ed8',shadowBlur:20}, label:{show:true,formatter:'{b}',fontSize:12,color:'#1d4ed8',position:'right',distance:5}},
        zlevel:2
      }
    ]
  });
  window.addEventListener('resize', ()=>chart.resize());
  refresh();
}

loadGeo();
</script>
